name: MediaLens.Native

on:
  push:
  pull_request:
  release:
    types:
      - published

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  PROJECT_NAME: MediaLens.Native
  GITHUB_FEED: https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  NUGET_FEED: https://api.nuget.org/v3/index.json
  NUGET_KEY: ${{ secrets.NUGET_KEY }}
  MEDIAINFO_VERSION: "24.12"

permissions:
  packages: write
  contents: read

jobs:
  build-native:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git automake autoconf libtool pkg-config make g++ zlib1g-dev

      - name: Download and extract MediaInfo source
        run: |
          wget -O mediainfo-src.tar.xz "https://mediaarea.net/download/binary/libmediainfo0/$MEDIAINFO_VERSION/MediaInfo_DLL_$MEDIAINFO_VERSION_GNU_FromSource.tar.xz"
          tar -xf mediainfo-src.tar.xz

      - name: Run SO_Compile.sh
        run: |
          find . -name "SO_Compile.sh" -exec chmod +x {} \;
          find . -name "SO_Compile.sh" -execdir ./SO_Compile.sh \;

      - name: Copy libraries
        run: |
          mkdir -p native
          find . -name "libmediainfo.so*" -exec cp {} native/ \;

      - name: Upload Native Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: native-linux-x64
          path: native/

  pack:
    needs: build-native
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Native Artifacts
        uses: actions/download-artifact@v4
        with:
          path: runtimes

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            9.x

      - name: Pack NuGet
        run: |
          latestTag=$(git describe --tags --abbrev=0 2>/dev/null || echo 0.0.1)
          runId=$GITHUB_RUN_ID
          packageVersion="${latestTag//v}-build.${runId}"

          mkdir -p src/$PROJECT_NAME/runtimes/linux-x64/native
          cp runtimes/native-linux-x64/* src/$PROJECT_NAME/runtimes/linux-x64/native/ || true

          dotnet pack -v normal -c Release -o ./artifacts \
            -p:PackageVersion=$packageVersion \
            src/$PROJECT_NAME/$PROJECT_NAME.csproj

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: nupkg
          path: ./artifacts/*.nupkg