name: MediaLens.Native

on:
  push:
  pull_request:
  release:
    types:
      - published

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  PROJECT_NAME: MediaLens.Native
  GITHUB_FEED: https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  NUGET_FEED: https://api.nuget.org/v3/index.json
  NUGET_KEY: ${{ secrets.NUGET_KEY }}
  MEDIAINFO_VERSION: "25.09"

permissions:
  packages: write
  contents: read

jobs:
  build-native-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git automake autoconf libtool pkg-config make g++ zlib1g-dev

      - name: Download and extract MediaInfo source
        run: |
          wget -O mediainfo-src.tar.xz "https://mediaarea.net/download/binary/libmediainfo0/${MEDIAINFO_VERSION}/MediaInfo_DLL_${MEDIAINFO_VERSION}_GNU_FromSource.tar.xz"
          tar -xf mediainfo-src.tar.xz

      - name: Run SO_Compile.sh
        run: |
          find . -name "SO_Compile.sh" -exec chmod +x {} \;
          find . -name "SO_Compile.sh" -execdir ./SO_Compile.sh \;

      - name: Copy libraries
        run: |
          mkdir -p native
          find . -name "libmediainfo.so*" -exec cp {} native/ \;

      - name: Upload Native Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: native-linux-x64
          path: native/

  build-native-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew install automake autoconf libtool pkg-config

      - name: Download and extract MediaInfo source
        run: |
          wget -O mediainfo-src.tar.xz "https://mediaarea.net/download/binary/libmediainfo0/${MEDIAINFO_VERSION}/MediaInfo_DLL_${MEDIAINFO_VERSION}_GNU_FromSource.tar.xz"
          tar -xf mediainfo-src.tar.xz

      - name: Run SO_Compile.sh
        run: |
          find . -name "SO_Compile.sh" -exec chmod +x {} \;
          find . -name "SO_Compile.sh" -execdir ./SO_Compile.sh \;

      - name: Copy libraries
        run: |
          mkdir -p native
          find . -name "libmediainfo.dylib" -exec cp {} native/ \;
          find . -name "libmediainfo.*.dylib" -exec cp {} native/ \;

      - name: Upload Native Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: native-osx-x64
          path: native/

  build-native-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download MediaInfo DLL
        shell: pwsh
        run: |
          $url = "https://mediaarea.net/download/binary/libmediainfo0/$env:MEDIAINFO_VERSION/MediaInfo_DLL_$env:MEDIAINFO_VERSION_Windows_x64_WithoutInstaller.7z"
          Invoke-WebRequest -Uri $url -OutFile "mediainfo.7z"
          7z x mediainfo.7z -o"mediainfo-extracted"

      - name: Copy libraries
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path native
          Copy-Item -Path "mediainfo-extracted\*.dll" -Destination "native\" -Recurse -ErrorAction SilentlyContinue

      - name: Upload Native Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: native-win-x64
          path: native/

  build:
    needs: [ build-native-linux, build-native-macos, build-native-windows ]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Native Artifacts
        uses: actions/download-artifact@v4
        with:
          path: runtimes

      - name: Setup .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            9.x

      - name: Prepare native libraries
        run: |
          mkdir -p src/$PROJECT_NAME/runtimes/linux-x64/native
          mkdir -p src/$PROJECT_NAME/runtimes/osx-x64/native
          mkdir -p src/$PROJECT_NAME/runtimes/win-x64/native
          cp runtimes/native-linux-x64/* src/$PROJECT_NAME/runtimes/linux-x64/native/ || true
          cp runtimes/native-osx-x64/* src/$PROJECT_NAME/runtimes/osx-x64/native/ || true
          cp runtimes/native-win-x64/* src/$PROJECT_NAME/runtimes/win-x64/native/ || true

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release --no-restore

      - name: Determine Version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "release" ]; then
            arrTag=(${GITHUB_REF//\// })
            VERSION="${arrTag[2]}"
            VERSION="${VERSION//v}"
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "Building release version: $VERSION"
          else
            latestTag=$(git describe --tags --abbrev=0 2>/dev/null || echo 0.0.1)
            runId=$GITHUB_RUN_ID
            VERSION="${latestTag//v}-build.${runId}"
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "Building pre-release version: $VERSION"
          fi

      - name: Pack
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          echo "Packing version: $VERSION"

          if [ "${{ github.event_name }}" == "release" ]; then
            # Release package with release notes
            dotnet pack -v normal -c Release -o ./artifacts --no-restore \
              -p:PackageVersion=$VERSION \
              -p:PackageReleaseNotes="See full release notes at: https://github.com/${{ github.repository }}/releases/tag/v$VERSION}" \
              src/$PROJECT_NAME/$PROJECT_NAME.csproj
          else
            # Pre-release package
            dotnet pack -v normal -c Release -o ./artifacts --no-restore \
              -p:PackageVersion=$VERSION \
              src/$PROJECT_NAME/$PROJECT_NAME.csproj
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: nupkg
          path: ./artifacts/*.nupkg

  prerelease:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: nupkg
          path: ./nupkg

      - name: Push to GitHub Feed
        run: dotnet nuget push ./nupkg/*.nupkg --source $GITHUB_FEED --no-symbols --skip-duplicate --api-key $GITHUB_TOKEN
        env:
          NUGET_AUTH_TOKEN: ${{ github.token }}

  deploy:
    needs: build
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: nupkg
          path: ./nupkg

      - name: Setup .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            9.x

      - name: Push to GitHub Feed
        run: dotnet nuget push ./nupkg/*.nupkg --source $GITHUB_FEED --no-symbols --skip-duplicate --api-key $GITHUB_TOKEN
        env:
          NUGET_AUTH_TOKEN: $GITHUB_TOKEN

      - name: Push to NuGet Feed
        run: dotnet nuget push ./nupkg/*.nupkg --source $NUGET_FEED --skip-duplicate --api-key $NUGET_KEY